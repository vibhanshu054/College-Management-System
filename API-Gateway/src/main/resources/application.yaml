server:
  port: 8080

spring:
  application:
    name: API-Gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Auth Service
        - id: auth-Service
          uri: lb://Auth-Service
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<path>.*), /${path}

            # Attendance-Service Service
        - id: attendance-service
          uri: lb://Attendance-Service
          predicates:
            - Path=/api/attendance/**
          filters:
            - RewritePath=/api/attendance/(?<path>.*), /${path}

        # User Service
        - id: user-service
          uri: lb://User-Service
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<path>.*), /${path}

        # Course Service
        - id: course-service
          uri: lb://Course-Service
          predicates:
            - Path=/api/courses/**
          filters:
            - RewritePath=/api/courses/(?<path>.*), /${path}

        # Student Service
        - id: student-service
          uri: lb://Student-Service
          predicates:
            - Path=/api/students/**
          filters:
            - RewritePath=/api/students/(?<path>.*), /${path}

        # Faculty Service
        - id: faculty-service
          uri: lb://Faculty-Service
          predicates:
            - Path=/api/faculty/**
          filters:
            - RewritePath=/api/faculty/(?<path>.*), /${path}

        # Library Service
        - id: library-service
          uri: lb://Library-Service
          predicates:
            - Path=/api/library/**
          filters:
            - RewritePath=/api/library/(?<path>.*), /${path}

        # Dashboard Service
        - id: dashboard-service
          uri: lb://Dashboard-Service
          predicates:
            - Path=/api/dashboard/**
          filters:
            - RewritePath=/api/dashboard/(?<path>.*), /${path}

            # Subject Service
        - id: subject-service
          uri: lb://Subject-Service
          predicates:
            - Path=/api/subjects/**
          filters:
            - RewritePath=/api/subjects/(?<path>.*), /${path}

        # Department Service
        - id: department-service
          uri: lb://Department-Service
          predicates:
            - Path=/api/departments/**
          filters:
            - RewritePath=/api/departments/(?<path>.*), /${path}

      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:3000"
              - "http://192.168.1.7:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

  webflux:
    base-path: /

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /api/auth/v3/api-docs

      - name: Attendance Service
        url: /api/attendance/v3/api-docs

      - name: Department Service
        url: /api/departments/v3/api-docs

      - name: Subject Service
        url: /api/subjects/v3/api-docs

      - name: User Service
        url: /api/users/v3/api-docs

      - name: Course Service
        url: /api/courses/v3/api-docs

      - name: Student Service
        url: /api/students/v3/api-docs

      - name: Faculty Service
        url: /api/faculty/v3/api-docs

      - name: Library Service
        url: /api/library/v3/api-docs

      - name: Dashboard Service
        url: /api/dashboard/v3/api-docs

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-32-characters-long!!}
  expiration: ${JWT_EXPIRATION:86400000}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1

logging:
  level:
    org.springframework.cloud.gateway: DEBUG